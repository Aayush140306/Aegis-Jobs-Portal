<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Aegis Jobs</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="login">

  <div id="nav-root"></div>

  <main class="page-main auth-page">

    <div class="auth-card card">
      <div class="card-body">

        <!-- Logo -->
        <div class="auth-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>

        <!-- Header (updated by JS on toggle) -->
        <div class="auth-header">
          <h2 id="auth-title">Welcome Back</h2>
          <p id="auth-subtitle">Sign in to access your account</p>
        </div>

        <!-- ===== LOGIN FORM ===== -->
        <form id="login-form" class="auth-form" novalidate id="login-section">
          <div id="login-section">

            <div class="form-group">
              <label class="form-label" for="login-email">Email</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </span>
                <input id="login-email" class="form-control" type="email" placeholder="you@example.com" autocomplete="email" />
              </div>
              <span class="form-error" id="login-email-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="login-password">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input id="login-password" class="form-control" type="password" placeholder="••••••••" autocomplete="current-password" />
              </div>
              <span class="form-error" id="login-password-error"></span>
            </div>

            <div class="auth-remember">
              <label class="remember-label">
                <input type="checkbox" /> Remember me
              </label>
              <a href="#" class="forgot-link text-sm">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-full btn-lg">Sign In</button>

            <p class="auth-toggle">
              Don't have an account?
              <button type="button" class="to-register">Sign up</button>
            </p>

          </div>
        </form>

        <!-- ===== REGISTER FORM ===== -->
        <form id="register-form" class="auth-form" novalidate style="display:none;">
          <div id="register-section" style="display:flex;flex-direction:column;gap:18px;">

            <div class="form-group">
              <label class="form-label" for="reg-name">Full Name <span class="required">*</span></label>
              <input id="reg-name" class="form-control" type="text" placeholder="John Doe" autocomplete="name" />
              <span class="form-error" id="reg-name-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="reg-email">Email <span class="required">*</span></label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </span>
                <input id="reg-email" class="form-control" type="email" placeholder="you@example.com" autocomplete="email" />
              </div>
              <span class="form-error" id="reg-email-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="reg-password">Password <span class="required">*</span></label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input id="reg-password" class="form-control" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
              </div>
              <span class="form-error" id="reg-password-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="reg-confirm">Confirm Password <span class="required">*</span></label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input id="reg-confirm" class="form-control" type="password" placeholder="Repeat password" autocomplete="new-password" />
              </div>
              <span class="form-error" id="reg-confirm-error"></span>
            </div>

            <button type="submit" class="btn btn-primary w-full btn-lg">Create Account</button>

            <p class="auth-toggle">
              Already have an account?
              <button type="button" class="to-login">Sign in</button>
            </p>

          </div>
        </form>

      </div>
    </div>

  </main>

  <div id="footer-root"></div>
  <div id="toast-container"></div>
  <script src="../js/script.js"></script>
</body>
</html>
