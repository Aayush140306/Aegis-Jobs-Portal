<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Applications — Aegis Jobs</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="applications">

  <div id="nav-root"></div>

  <main class="page-main" style="background: var(--bg-muted);">

    <!-- Page header -->
    <div class="page-banner">
      <div class="container">
        <div class="flex items-center gap-3 mb-2">
          <div style="background: var(--primary-light); border-radius: var(--radius); padding: 10px; display:flex;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <h1>My Applications</h1>
        </div>
        <p>Track the status of your job applications</p>
      </div>
    </div>

    <div class="applications-wrap">

      <!-- Count (shown when there are applications) -->
      <p class="jobs-count" id="applications-count" style="margin-bottom:20px;"></p>

      <!-- Empty state -->
      <div id="applications-empty" style="display:none;">
        <div class="card">
          <div class="card-body empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <h3>No Applications Yet</h3>
            <p>You haven't applied to any jobs yet. Start exploring opportunities!</p>
            <a href="jobs.html" class="btn btn-primary">Browse Jobs</a>
          </div>
        </div>
      </div>

      <!-- Applications list (populated by JS) -->
      <div id="applications-list"></div>

    </div>
  </main>

  <div id="footer-root"></div>
  <div id="toast-container"></div>
  <script src="../js/script.js"></script>
</body>
</html>
